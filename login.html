@model exam4.ViewModels.Account.LoginVM

<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-sm" style="width: 350px;">
        <div class="card-body">
            <h3 class="text-center mb-4 text-primary">Login</h3>
            
            <form method="post">
                <div asp-validation-summary="ModelOnly" class="text-danger mb-3"></div>
                
                <div class="mb-3">
                    <input asp-for="UsernameOrEmail" class="form-control" placeholder="Username or Email"/>
                    <span asp-validation-for="UsernameOrEmail" class="text-danger small"></span>
                </div>
                
                <div class="mb-3">
                    <input asp-for="Password" class="form-control" placeholder="Password"/>
                    <span asp-validation-for="Password" class="text-danger small"></span>
                </div>
                
                <div class="form-check mb-4">
                    <input asp-for="IsPersistent" class="form-check-input" type="checkbox" />
                    <label asp-for="IsPersistent" class="form-check-label">Remember Me</label>
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-grow-1">Login</button>
                    <a asp-controller="Home" asp-action="Index" class="btn btn-secondary flex-grow-1">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
